# GitHub Actions — WXT Extension (lat-tab, play-faster)
# Triggers: push to develop (CI), merge to master with version bump (deploy)
name: CI / Deploy

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run build:firefox
      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3
          path: .output/chrome-mv3/

  deploy:
    name: Deploy to Chrome Web Store
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check version bump
        id: version_check
        run: |
          OLD=$(git show HEAD~1:package.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','0'))")
          NEW=$(python3 -c "import json; print(json.load(open('package.json')).get('version','0'))")
          echo "old=$OLD"
          echo "new=$NEW"
          echo "bumped=$([ '$OLD' != '$NEW' ] && echo true || echo false)" >> $GITHUB_OUTPUT
      - name: Skip if no version bump
        if: steps.version_check.outputs.bumped != 'true'
        run: echo "No version bump — skipping deploy" && exit 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run zip
      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: .output/*.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.GOOGLE_CLIENT_ID }}
          client-secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          refresh-token: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
