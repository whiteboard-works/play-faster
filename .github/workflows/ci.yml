# GitHub Actions — WXT Extension (lat-tab, play-faster)
# CI: runs on every push to develop and every PR to master
# Deploy: runs on push to master when manifest.json version changes
name: CI / Deploy

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run build:firefox
      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3
          path: .output/chrome-mv3/

  deploy:
    name: Deploy to Chrome Web Store
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check version bump
        id: version_check
        run: |
          OLD=$(git show HEAD~1:package.json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('version','0'))" 2>/dev/null || echo "0")
          NEW=$(python3 -c "import json; print(json.load(open('package.json')).get('version','0'))")
          echo "old=$OLD new=$NEW"
          if [ "$OLD" != "$NEW" ]; then echo "bumped=true" >> $GITHUB_OUTPUT; else echo "bumped=false" >> $GITHUB_OUTPUT; fi
      - name: Build & zip
        if: steps.version_check.outputs.bumped == 'true'
        run: |
          npm ci
          npm run zip
      - name: Deploy via service account
        if: steps.version_check.outputs.bumped == 'true'
        env:
          SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          pip install google-auth google-auth-httplib2 --quiet
          echo "$SERVICE_ACCOUNT_KEY" > /tmp/sa-key.json
          ZIP=$(ls .output/*.zip | head -1)
          python3 - <<'PYEOF'
          import json, sys, urllib.request
          from pathlib import Path
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request
          import os

          KEY = json.loads(os.environ["SERVICE_ACCOUNT_KEY"])
          APP_ID = os.environ["EXTENSION_ID"]
          ZIP = Path(os.popen("ls .output/*.zip | head -1").read().strip())

          creds = service_account.Credentials.from_service_account_info(
              KEY, scopes=["https://www.googleapis.com/auth/chromewebstore"]
          )
          creds.refresh(Request())
          token = creds.token

          # Upload
          url = f"https://www.googleapis.com/upload/chromewebstore/v1.1/items/{APP_ID}"
          req = urllib.request.Request(url, data=ZIP.read_bytes(), method="PUT",
              headers={"Authorization": f"Bearer {token}", "x-goog-api-version": "2"})
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())
          print("Upload:", result.get("uploadState"))

          # Publish
          pub_url = f"https://www.googleapis.com/chromewebstore/v1.1/items/{APP_ID}/publish"
          req2 = urllib.request.Request(pub_url, data=b"{}", method="POST",
              headers={"Authorization": f"Bearer {token}", "x-goog-api-version": "2",
                       "Content-Type": "application/json"})
          with urllib.request.urlopen(req2) as r:
              pub = json.loads(r.read())
          print("Publish:", pub.get("status"))
          PYEOF
