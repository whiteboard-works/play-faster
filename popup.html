<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
    }

    .label {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .controls button {
      width: 32px;
      height: 32px;
      padding: 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #f9fafb;
      transition: background 0.1s, border-color 0.1s;
      flex-shrink: 0;
    }

    .controls button:hover {
      background: #f0fdf4;
      border-color: #22c55e;
      color: #16a34a;
    }

    input[type="number"] {
      flex: 1;
      height: 32px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      -moz-appearance: textfield;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #22c55e;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .footer {
      margin-top: 10px;
      text-align: center;
      font-size: 9px;
      color: #d1d5db;
    }

    .footer a {
      color: #d1d5db;
      text-decoration: none;
    }

    .footer a:hover {
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="label">SPEED</div>
  <div class="controls">
    <button class="large" data-delta="-0.5">&lt;&lt;</button>
    <button data-delta="-0.1">&lt;</button>
    <input type="number" id="speed" min="0.1" max="16" step="0.1">
    <button data-delta="0.1">&gt;</button>
    <button class="large" data-delta="0.5">&gt;&gt;</button>
  </div>
  <div class="footer"><a href="https://whiteboardworks.com" target="_blank" rel="noopener">whiteboardworks.com</a></div>
  <script src="popup.js"></script>
</body>
</html>
