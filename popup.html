<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 180px;
      padding: 10px;
      font-family: system-ui;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .controls button {
      width: 32px;
      height: 32px;
      padding: 0;
      cursor: pointer;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
    }
    .controls button:hover {
      background: #e0e0e0;
    }
    .controls button.large {
      font-weight: bold;
    }
    input[type="number"] {
      width: 60px;
      height: 28px;
      text-align: center;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .label {
      text-align: center;
      font-size: 11px;
      color: #666;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="label">Playback Speed</div>
  <div class="controls">
    <button class="large" data-delta="-0.5">&lt;&lt;</button>
    <button data-delta="-0.1">&lt;</button>
    <input type="number" id="speed" min="0.1" max="16" step="0.1">
    <button data-delta="0.1">&gt;</button>
    <button class="large" data-delta="0.5">&gt;&gt;</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
